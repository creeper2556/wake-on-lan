name: build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  docker-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest-amd64

  docker-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest-arm64

  merge:
    needs: [docker-amd64, docker-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          REPO=ghcr.io/${{ github.repository }}
          docker buildx imagetools create -t $REPO:latest $REPO:latest-amd64 $REPO:latest-arm64
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            docker buildx imagetools create -t $REPO:${{ github.ref_name }} $REPO:latest-amd64 $REPO:latest-arm64
          fi
